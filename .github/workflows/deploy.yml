name: Verify and Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  verify-local:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Run local Playwright QA
        shell: bash
        run: |
          mkdir -p .qa
          npx playwright test --config=playwright.config.js --reporter=json > .qa/playwright-local.json
          node tools/verify-playwright-results.js .qa/playwright-local.json

  verify-live:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify-local
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_LIVE_SUPABASE_URL: ${{ secrets.PLAYWRIGHT_LIVE_SUPABASE_URL }}
      PLAYWRIGHT_LIVE_SUPABASE_ANON_KEY: ${{ secrets.PLAYWRIGHT_LIVE_SUPABASE_ANON_KEY }}
      PLAYWRIGHT_LIVE_STUDENT_EMAIL: ${{ secrets.PLAYWRIGHT_LIVE_STUDENT_EMAIL }}
      PLAYWRIGHT_LIVE_STUDENT_PASSWORD: ${{ secrets.PLAYWRIGHT_LIVE_STUDENT_PASSWORD }}
      PLAYWRIGHT_LIVE_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_LIVE_ADMIN_EMAIL }}
      PLAYWRIGHT_LIVE_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_LIVE_ADMIN_PASSWORD }}
      PLAYWRIGHT_LIVE_TRAINER_EMAIL: ${{ secrets.PLAYWRIGHT_LIVE_TRAINER_EMAIL }}
      PLAYWRIGHT_LIVE_TRAINER_PASSWORD: ${{ secrets.PLAYWRIGHT_LIVE_TRAINER_PASSWORD }}
      PLAYWRIGHT_LIVE_MARKETER_EMAIL: ${{ secrets.PLAYWRIGHT_LIVE_MARKETER_EMAIL }}
      PLAYWRIGHT_LIVE_MARKETER_PASSWORD: ${{ secrets.PLAYWRIGHT_LIVE_MARKETER_PASSWORD }}
      PLAYWRIGHT_LIVE_STAFF_EMAIL: ${{ secrets.PLAYWRIGHT_LIVE_STAFF_EMAIL }}
      PLAYWRIGHT_LIVE_STAFF_PASSWORD: ${{ secrets.PLAYWRIGHT_LIVE_STAFF_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run live Supabase QA
        shell: bash
        run: |
          mkdir -p .qa
          npx playwright test --config=playwright.live.config.js --reporter=json > .qa/playwright-live.json
          node tools/verify-playwright-results.js .qa/playwright-live.json

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - verify-local
      - verify-live
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write deploy info
        shell: bash
        run: |
          echo "commit: $GITHUB_SHA" > deploy-info.txt
          echo "deployed_at_utc: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> deploy-info.txt
          echo "deployed_at_wib: $(TZ=Asia/Jakarta date '+%Y-%m-%d %H:%M:%S WIB')" >> deploy-info.txt

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./ # folder yang mau di-upload (./  = semua file)
          server-dir: /home/u838818830/domains/redlineacademy.com.au/public_html/ # folder tujuan di Hostinger
          exclude: |
            **/.git*
            **/.github/**
            **/.vscode/**
            **/.venv/**
            **/node_modules/**
            **/logs/**
            **/output/**
            **/tools/**
            **/docs/**
            **/*.md
            **/*.sql
            **/*.ps1
            **/test-lang.html
            **/uploads_private/**
            **/package*.json
