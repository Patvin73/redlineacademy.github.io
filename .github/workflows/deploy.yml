name: Verify and Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  verify-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate QA report
        run: node tools/qa-observability.js report > docs/QA_REPORT.md

      - name: Lint
        run: npm run lint

      - name: Run smoke tests
        shell: bash
        run: |
          mkdir -p .qa
          npx playwright test --config=playwright.config.js --grep "@critical" --reporter=json > .qa/playwright-smoke.json
          node tools/verify-playwright-results.js .qa/playwright-smoke.json

      - name: Upload QA report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: docs/QA_REPORT.md
          if-no-files-found: error
          retention-days: 14

  verify-regression:
    needs: verify-smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full regression suite
        shell: bash
        run: |
          mkdir -p .qa
          npx playwright test --config=playwright.config.js --reporter=json > .qa/playwright-regression.json
          node tools/verify-playwright-results.js .qa/playwright-regression.json

  verify-live:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify-regression
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_LIVE_SUPABASE_URL: ${{ secrets.PLAYWRIGHT_LIVE_SUPABASE_URL }}
      PLAYWRIGHT_LIVE_SUPABASE_ANON_KEY: ${{ secrets.PLAYWRIGHT_LIVE_SUPABASE_ANON_KEY }}
      PLAYWRIGHT_LIVE_STUDENT_EMAIL: ${{ secrets.PLAYWRIGHT_LIVE_STUDENT_EMAIL }}
      PLAYWRIGHT_LIVE_STUDENT_PASSWORD: ${{ secrets.PLAYWRIGHT_LIVE_STUDENT_PASSWORD }}
      PLAYWRIGHT_LIVE_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_LIVE_ADMIN_EMAIL }}
      PLAYWRIGHT_LIVE_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_LIVE_ADMIN_PASSWORD }}
      PLAYWRIGHT_LIVE_TRAINER_EMAIL: ${{ secrets.PLAYWRIGHT_LIVE_TRAINER_EMAIL }}
      PLAYWRIGHT_LIVE_TRAINER_PASSWORD: ${{ secrets.PLAYWRIGHT_LIVE_TRAINER_PASSWORD }}
      PLAYWRIGHT_LIVE_MARKETER_EMAIL: ${{ secrets.PLAYWRIGHT_LIVE_MARKETER_EMAIL }}
      PLAYWRIGHT_LIVE_MARKETER_PASSWORD: ${{ secrets.PLAYWRIGHT_LIVE_MARKETER_PASSWORD }}
      PLAYWRIGHT_LIVE_STAFF_EMAIL: ${{ secrets.PLAYWRIGHT_LIVE_STAFF_EMAIL }}
      PLAYWRIGHT_LIVE_STAFF_PASSWORD: ${{ secrets.PLAYWRIGHT_LIVE_STAFF_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run live Supabase QA
        shell: bash
        run: |
          mkdir -p .qa
          npx playwright test --config=playwright.live.config.js --reporter=json > .qa/playwright-live.json
          node tools/verify-playwright-results.js .qa/playwright-live.json

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - verify-regression
      - verify-live
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write deploy info
        shell: bash
        run: |
          echo "commit: $GITHUB_SHA" > deploy-info.txt
          echo "deployed_at_utc: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> deploy-info.txt
          echo "deployed_at_wib: $(TZ=Asia/Jakarta date '+%Y-%m-%d %H:%M:%S WIB')" >> deploy-info.txt

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./ # deploy dari root repo, tetapi file non-runtime disaring lewat exclude
          server-dir: /home/u838818830/domains/redlineacademy.com.au/public_html/ # web root aktif di Hostinger
          exclude: |
            **/.git*
            **/.github/**
            **/.vscode/**
            **/.venv/**
            **/.agent/**
            **/.agents/**
            **/.claude/**
            **/.trae/**
            **/.windsurf/**
            **/.npm-cache/**
            **/.playwright-cli/**
            **/node_modules/**
            **/logs/**
            **/output/**
            **/test-results/**
            **/qa/**
            **/tests/**
            **/tools/**
            **/docs/**
            **/*.md
            **/*.sql
            **/*.ps1
            **/test-lang.html
            **/uploads_private/**
            **/package*.json
            **/jest.config.js
            **/playwright*.js
            **/eslint.config.js
            **/.env*
            **/tmp-*.txt
            scripts/script.js
            scripts/script_translations_patch.js
            scripts/dashboard-admin.js
            scripts/dashboard-marketer.js
            scripts/dashboard-student.js
            scripts/auth.js
            scripts/guard.js
            scripts/supabase-client.js
            scripts/internal-links.js
            scripts/validate-seo-structure.js
