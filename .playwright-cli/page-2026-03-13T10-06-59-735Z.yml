        - heading "Program Micro-Credentials Australia" [level=3] [ref=e83]
        - paragraph [ref=e84]: Baik kamu pemula maupun ingin mengasah kemampuan, program kami mengikuti Microcredentials Framework. Artinya, kamu memperoleh kualifikasi yang memenuhi standar internasional dan diakui lintas industri, memberi dasar yang kuat untuk peluang karier di masa depan.
      - generic [ref=e86]:
        - img [ref=e88]
        - heading "Komitmen terhadap Keunggulan" [level=3] [ref=e90]
        - paragraph [ref=e91]: Di RedLine Academy, keunggulan bukan sekadar tujuan — ini adalah budaya kami. Kami berfokus pada pengembangan berpikir kritis dan pemecahan masalah, mendorong siswa melampaui sekadar menghafal. Dengan dukungan pengajar yang kompeten dan standar tinggi, kami menciptakan lingkungan di mana pembelajar dapat tumbuh percaya diri dan meraih kesuksesan yang berkelanjutan.
