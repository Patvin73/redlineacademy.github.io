      - generic [ref=e29]:
        - heading "1. Penerimaan Syarat" [level=3] [ref=e30]
        - paragraph [ref=e31]: Dengan mengakses dan menggunakan website Redline Academy, Anda menerima dan setuju untuk terikat oleh syarat dan ketentuan serta kebijakan privasi kami. Jika Anda tidak setuju dengan bagian mana pun dari syarat ini, maka Anda tidak dapat menggunakan layanan kami.
        - heading "2. Penggunaan Lisensi" [level=3] [ref=e32]
        - paragraph [ref=e33]: Kami memberikan lisensi terbatas, non-eksklusif, dan dapat dicabut untuk mengakses dan menggunakan website kami untuk tujuan pribadi dan non-komersial. Anda tidak boleh mereproduksi, mendistribusikan, atau mengirimkan konten tanpa persetujuan tertulis dari kami.
        - heading "3. Penafian Konten" [level=3] [ref=e34]
        - paragraph [ref=e35]: Konten di website kami disediakan "sebagaimana adanya" tanpa jaminan apa pun. Kami tidak membuat pernyataan atau jaminan tentang keakuratan, kelengkapan, atau kualitas informasi yang disediakan. Anda menggunakan konten kami atas risiko Anda sendiri.
        - heading "4. Batasan Tanggung Jawab" [level=3] [ref=e36]
        - paragraph [ref=e37]: Dalam hal apa pun, Redline Academy tidak akan bertanggung jawab atas kerugian langsung, tidak langsung, insidental, khusus, atau konsekuensial yang timbul dari penggunaan atau ketidakmampuan menggunakan website kami atau layanan kami.
        - heading "5. Tautan Pihak Ketiga" [level=3] [ref=e38]
        - paragraph [ref=e39]: Website kami dapat berisi tautan ke website pihak ketiga. Kami tidak bertanggung jawab atas konten, akurasi, atau praktik privasi dari situs web eksternal. Penggunaan situs web pihak ketiga diatur oleh syarat dan kebijakan privasi mereka sendiri.
        - heading "6. Modifikasi Syarat" [level=3] [ref=e40]
        - paragraph [ref=e41]: Kami berhak untuk memodifikasi syarat dan ketentuan ini kapan saja. Perubahan akan berlaku segera setelah diposting di website. Penggunaan berkelanjutan dari website kami setelah perubahan berarti Anda menerima syarat yang dimodifikasi.
        - heading "7. Hukum yang Berlaku" [level=3] [ref=e42]
        - paragraph [ref=e43]: Syarat dan ketentuan ini diatur oleh dan ditafsirkan sesuai dengan hukum Indonesia, dan Anda secara tidak terbatas setuju untuk tunduk pada yurisdiksi eksklusif pengadilan di Indonesia.
        - heading "8. Hubungi Kami" [level=3] [ref=e44]
        - paragraph [ref=e45]: Jika Anda memiliki pertanyaan tentang syarat dan ketentuan ini, silakan hubungi kami di info@redlineacademy.com.au atau melalui formulir kontak kami.
