<!doctype html>
<html lang="id">
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Redline Academy</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/lms.css" />

    <!--
      Inline i18n patch: keys baru untuk tab login dan marketer portal.
      Di-merge ke window.translations setelah script.js dimuat.
    -->
    <script>
      window.__loginI18nPatch = {
        id: {
          loginTabLMS:               "Login LMS",
          loginTabStaff:             "Marketer Portal",
          staffLoginTitle:           "Marketer Portal",
          staffLoginBadge:           "Portal",
          staffLoginSubtitle:        "Masuk ke portal komisi & manajemen pemasaran.",
          staffLoginButton:          "Masuk ke Portal",
          staffLoginSuccessRedirect: "Login berhasil. Mengarahkan ke portal...",
          lmsErrWrongRoleForPortal:  "Akun ini tidak memiliki akses ke portal ini. Gunakan form login yang sesuai.",
        },
        en: {
          loginTabLMS:               "LMS Login",
          loginTabStaff:             "Marketer Portal",
          loginEmailPlaceholder:     "Your Email",
          staffLoginTitle:           "Marketer Portal",
          staffLoginBadge:           "Portal",
          staffLoginSubtitle:        "Sign in to the commission & marketing management portal.",
          staffLoginButton:          "Sign In to Portal",
          staffLoginSuccessRedirect: "Login successful. Redirecting to portal...",
          lmsErrWrongRoleForPortal:  "This account does not have access to this portal. Please use the correct login form.",
        },
      };
    </script>
    <link rel="canonical" href="https://redlineacademy.com.au/pages/login.html" />
  <meta name="description" content="Halaman utilitas internal Redline Academy." />
</head>

  <body class="lms-auth-page">
    <main class="lms-auth-wrap">
      <section class="lms-auth-card">

        <!-- Language Switcher -->
        <div class="language-switcher" role="navigation" aria-label="Language selector">
          <button class="lang-btn" data-lang="id" aria-label="Bahasa Indonesia">
            <img src="../assets/images/flags/id.png" alt="Bendera Indonesia" class="flag" aria-hidden="true" loading="lazy" decoding="async" width="512" height="512">
            <span class="sr-only">Bahasa Indonesia</span>
          </button>
          <button class="lang-btn" data-lang="en" aria-label="English">
            <img src="../assets/images/flags/en.png" alt="Bendera Inggris" class="flag" aria-hidden="true" loading="lazy" decoding="async" width="512" height="512">
            <span class="sr-only">English</span>
          </button>
        </div>

        <!-- Tab Switcher -->
        <div class="login-tabs" role="tablist" aria-label="Pilih jenis login">
          <button
            class="login-tab-btn active"
            role="tab"
            aria-selected="true"
            aria-controls="panel-lms"
            id="tab-lms"
            data-tab="lms"
          >
            <span class="login-tab-dot" aria-hidden="true"></span>
            <span id="tabLabelLMS">Login LMS</span>
          </button>
          <button
            class="login-tab-btn"
            role="tab"
            aria-selected="false"
            aria-controls="panel-staff"
            id="tab-staff"
            data-tab="staff"
          >
            <span class="login-tab-dot" aria-hidden="true"></span>
            <span id="tabLabelStaff">Marketer Portal</span>
          </button>
        </div>

        <!-- ══════════════════════════════
             PANEL 1 — LMS LOGIN
        ══════════════════════════════ -->
        <div class="login-panel active" id="panel-lms" role="tabpanel" aria-labelledby="tab-lms">
          <h1 data-i18n="lmsLoginTitle">Login LMS</h1>
          <p data-i18n="lmsLoginSubtitle">Masuk dengan akun resmi Redline Academy.</p>

          <form id="loginFormLMS" class="lms-form" novalidate>
            <label for="lms-email" data-i18n="email">Email</label>
            <input
              id="lms-email"
              name="email"
              type="email"
              required
              autocomplete="email"
              data-i18n="emailPlaceholder"
              placeholder="email@example.com"
            />

            <label for="lms-password" data-i18n="password">Password</label>
            <input
              id="lms-password"
              name="password"
              type="password"
              required
              autocomplete="current-password"
              data-i18n="lmsPasswordPlaceholder"
              placeholder="Password"
            />

            <button type="submit" class="btn btn-primary" data-i18n="lmsLoginButton">Masuk</button>
          </form>

          <p id="loginMessageLMS" class="lms-message" aria-live="polite"></p>
        </div>

        <!-- ══════════════════════════════
             PANEL 2 — MARKETER PORTAL
        ══════════════════════════════ -->
        <div class="login-panel" id="panel-staff" role="tabpanel" aria-labelledby="tab-staff">
          <h2>
            <span id="staffPanelTitle">Marketer Portal</span>
            <span class="login-role-badge" id="staffPanelBadge">Portal</span>
          </h2>
          <p id="staffPanelSubtitle">Masuk ke portal komisi &amp; manajemen pemasaran.</p>

          <form id="loginFormStaff" class="lms-form" novalidate>
            <label for="staff-email" data-i18n="email">Email</label>
            <input
              id="staff-email"
              name="email"
              type="email"
              required
              autocomplete="email"
              data-i18n="emailPlaceholder"
              placeholder="email@example.com"
            />

            <label for="staff-password" data-i18n="password">Password</label>
            <input
              id="staff-password"
              name="password"
              type="password"
              required
              autocomplete="current-password"
              data-i18n="lmsPasswordPlaceholder"
              placeholder="Password"
            />

            <button type="submit" class="btn btn-primary" id="staffLoginBtn">Masuk ke Portal</button>
          </form>

          <p id="loginMessageStaff" class="lms-message" aria-live="polite"></p>
        </div>

        <!-- Back link -->
        <a href="../" class="lms-back-link" data-i18n="lmsBackToSite">
          Kembali ke website utama
        </a>

      </section>
    </main>

    <!-- Scripts -->
    <script>
      (function () {
        if (window.__LMS_SUPABASE_BOOTSTRAP__) return;

        var primarySrc =
          window.__SUPABASE_SDK_SRC__ ||
          "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
        var fallbackSrc =
          window.__SUPABASE_SDK_FALLBACK_SRC__ ||
          "https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js";

        function loadScript(src, timeoutMs) {
          return new Promise(function (resolve, reject) {
            var script = document.createElement("script");
            var settled = false;
            var timerId = window.setTimeout(function () {
              if (settled) return;
              settled = true;
              script.remove();
              reject(new Error("Supabase SDK load timeout: " + src));
            }, timeoutMs);

            script.src = src;
            script.async = true;
            script.onload = function () {
              if (settled) return;
              settled = true;
              window.clearTimeout(timerId);
              resolve(src);
            };
            script.onerror = function () {
              if (settled) return;
              settled = true;
              window.clearTimeout(timerId);
              script.remove();
              reject(new Error("Supabase SDK failed to load: " + src));
            };

            document.head.appendChild(script);
          });
        }

        window.__LMS_SUPABASE_BOOTSTRAP__ = loadScript(primarySrc, 6000)
          .catch(function (error) {
            console.warn("[SUPABASE] primary SDK load failed", error);
            return loadScript(fallbackSrc, 6000);
          })
          .then(function (src) {
            console.log("[SUPABASE] SDK loaded", src);
            return src;
          })
          .catch(function (error) {
            console.error("[SUPABASE] SDK bootstrap failed", error);
            throw error;
          });
      })();
    </script>
    <script src="../js/script.js" defer></script>
    <script src="../js/supabase-client.js" defer></script>
    <script src="../js/auth.js" defer></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {

        // 1. Merge i18n patch ke store i18n global yang tersedia
        var loginFallbackTranslations = {
          id: {
            email: "Email",
            emailPlaceholder: "Email Anda",
            loginEmailPlaceholder: "Email Anda",
            password: "Password",
            lmsPasswordPlaceholder: "Masukkan password Anda",
            lmsLoginTitle: "Login LMS",
            lmsLoginSubtitle: "Masuk dengan akun resmi Redline Academy.",
            lmsLoginButton: "Masuk",
            lmsBackToSite: "Kembali ke website utama",
          },
          en: {
            email: "Email",
            emailPlaceholder: "Your Email",
            loginEmailPlaceholder: "Your Email",
            password: "Password",
            lmsPasswordPlaceholder: "Enter your password",
            lmsLoginTitle: "LMS Login",
            lmsLoginSubtitle: "Sign in with your official Redline Academy account.",
            lmsLoginButton: "Sign In",
            lmsBackToSite: "Back to main website",
          },
        };
        var translationStore =
          window.translations ||
          (typeof translations !== "undefined" ? translations : null) ||
          loginFallbackTranslations;

        if (!window.translations) {
          window.translations = translationStore;
        }

        if (translationStore && window.__loginI18nPatch) {
          Object.keys(window.__loginI18nPatch).forEach(function (lang) {
            if (translationStore[lang]) {
              Object.assign(translationStore[lang], window.__loginI18nPatch[lang]);
            }
          });
          if (typeof window.updatePageLanguage === "function") {
            window.updatePageLanguage();
          } else if (typeof updatePageLanguage === "function") {
            updatePageLanguage();
          }
        }

        // 2. Helper
        function tSafe(key, fallback) {
          if (typeof window.t === "function") return window.t(key);
          return typeof t === "function" ? t(key) : fallback;
        }

        function translateLogin(key, fallback, lang) {
          if (
            translationStore &&
            translationStore[lang] &&
            Object.prototype.hasOwnProperty.call(translationStore[lang], key)
          ) {
            return translationStore[lang][key];
          }
          return tSafe(key, fallback);
        }

        if (typeof window.t !== "function") {
          window.t = function (key) {
            var activeLang = document.documentElement.lang === "en" ? "en" : "id";
            return translateLogin(key, key, activeLang);
          };
        }

        function updateLoginLanguageElements(lang) {
          document.documentElement.lang = lang;

          document.querySelectorAll("[data-i18n]").forEach(function (element) {
            var key = element.getAttribute("data-i18n");
            var fallback =
              element.tagName === "INPUT" || element.tagName === "TEXTAREA"
                ? element.getAttribute("placeholder") || key
                : element.textContent || key;
            var text = translateLogin(key, fallback, lang);

            if (element.tagName === "INPUT" || element.tagName === "TEXTAREA") {
              element.placeholder = text;
            } else if (typeof text === "string" && text.indexOf("<") !== -1) {
              element.innerHTML = text;
            } else {
              element.textContent = text;
            }
          });
        }

        // 3. Terapkan label dan placeholder login yang kritikal
        function applyLoginLabels(lang) {
          var textMap = {
            tabLabelLMS: ["loginTabLMS", "Login LMS"],
            tabLabelStaff: ["loginTabStaff", "Marketer Portal"],
            staffPanelTitle: ["staffLoginTitle", "Marketer Portal"],
            staffPanelBadge: ["staffLoginBadge", "Portal"],
            staffPanelSubtitle: [
              "staffLoginSubtitle",
              "Masuk ke portal komisi & manajemen pemasaran."
            ],
            staffLoginBtn: ["staffLoginButton", "Masuk ke Portal"],
          };

          Object.keys(textMap).forEach(function (id) {
            var el = document.getElementById(id);
            if (el) el.textContent = translateLogin(textMap[id][0], textMap[id][1], lang);
          });

          var placeholderMap = {
            "lms-email": ["loginEmailPlaceholder", "Email Anda"],
            "staff-email": ["loginEmailPlaceholder", "Email Anda"],
            "lms-password": ["lmsPasswordPlaceholder", "Masukkan password Anda"],
            "staff-password": ["lmsPasswordPlaceholder", "Masukkan password Anda"],
          };

          Object.keys(placeholderMap).forEach(function (id) {
            var input = document.getElementById(id);
            if (input) {
              input.placeholder = translateLogin(
                placeholderMap[id][0],
                placeholderMap[id][1],
                lang
              );
            }
          });
        }

        function applyLoginLanguage(lang) {
          var nextLang = lang === "en" ? "en" : "id";

          try {
            localStorage.setItem("language", nextLang);
          } catch (err) {
            // Ignore storage restrictions and still update the DOM.
          }

          updateLoginLanguageElements(nextLang);
          applyLoginLabels(nextLang);

          document.querySelectorAll(".lang-btn").forEach(function (button) {
            button.classList.toggle("active", button.getAttribute("data-lang") === nextLang);
          });
        }

        if (typeof window.updatePageLanguage !== "function") {
          window.updatePageLanguage = function () {
            var activeLang = document.documentElement.lang === "en" ? "en" : "id";
            applyLoginLanguage(activeLang);
          };
        }

        if (typeof window.setLanguage !== "function") {
          window.setLanguage = function (lang) {
            applyLoginLanguage(lang);
          };
        }

        var initialLanguage = "id";
        try {
          initialLanguage = localStorage.getItem("language") || document.documentElement.lang || "id";
        } catch (err) {
          initialLanguage = document.documentElement.lang || "id";
        }
        applyLoginLanguage(initialLanguage);

        function getAuthModule() {
          if (window.lmsAuth && typeof window.lmsAuth.signIn === "function") {
            return window.lmsAuth;
          }
          return null;
        }

        function waitForAuthModule(timeoutMs) {
          var startedAt = Date.now();

          return new Promise(function (resolve, reject) {
            (function check() {
              var auth = getAuthModule();
              if (auth) {
                resolve(auth);
                return;
              }

              if (Date.now() - startedAt >= timeoutMs) {
                reject(new Error("Modul login belum siap. Pastikan Supabase SDK dan auth.js berhasil dimuat."));
                return;
              }

              setTimeout(check, 50);
            })();
          });
        }

        function withTimeout(promise, timeoutMs, timeoutMessage) {
          return new Promise(function (resolve, reject) {
            var settled = false;
            var timerId = setTimeout(function () {
              if (settled) return;
              settled = true;
              reject(new Error(timeoutMessage));
            }, timeoutMs);

            Promise.resolve(promise)
              .then(function (value) {
                if (settled) return;
                settled = true;
                clearTimeout(timerId);
                resolve(value);
              })
              .catch(function (error) {
                if (settled) return;
                settled = true;
                clearTimeout(timerId);
                reject(error);
              });
          });
        }

        function setFormLoadingState(form, isLoading) {
          if (!form) return;

          var submitButton = form.querySelector('button[type="submit"]');
          if (submitButton) {
            submitButton.disabled = !!isLoading;
            submitButton.setAttribute("aria-disabled", isLoading ? "true" : "false");
          }
        }

        function getFallbackRedirect(auth, result, allowedRoles) {
          if (result && typeof result.redirectTo === "string" && result.redirectTo.trim()) {
            return result.redirectTo;
          }

          var role = result && result.role;
          if (!role && Array.isArray(allowedRoles)) {
            if (allowedRoles.indexOf("marketer") !== -1 || allowedRoles.indexOf("staff") !== -1) {
              role = "marketer";
            } else if (allowedRoles.indexOf("admin") !== -1) {
              role = "admin";
            } else if (allowedRoles.indexOf("trainer") !== -1) {
              role = "trainer";
            } else if (allowedRoles.indexOf("student") !== -1) {
              role = "student";
            }
          }

          if (role && auth && typeof auth.getDashboardRouteByRole === "function") {
            return auth.getDashboardRouteByRole(role);
          }

          return null;
        }

        async function handleLoginSubmit(options) {
          var form = options.form;
          var emailInput = options.emailInput;
          var passwordInput = options.passwordInput;
          var messageEl = options.messageEl;
          var allowedRoles = options.allowedRoles;
          var successKey = options.successKey;
          var successFallback = options.successFallback;

          var email = emailInput.value.trim();
          var password = passwordInput.value;
          if (!email || !password) return;

          setFormLoadingState(form, true);
          messageEl.textContent = tSafe("lmsLoggingIn", "Memproses login...");
          messageEl.classList.remove("error");

          try {
            var auth = await waitForAuthModule(8000);
            console.log("[LOGIN] Attempt", {
              email: email,
              role: allowedRoles.join(",")
            });

            var result = await withTimeout(
              auth.signIn(email, password, allowedRoles),
              20000,
              "Login melebihi batas waktu. Silakan coba lagi."
            );

            console.log("[LOGIN RESULT]", result);

            if (!result || typeof result !== "object") {
              throw new Error("Respons login tidak valid.");
            }

            if (!result.ok) {
              throw new Error(result.error || "Login gagal.");
            }

            var redirectTarget = getFallbackRedirect(auth, result, allowedRoles);
            if (!redirectTarget) {
              throw new Error("Redirect login tidak tersedia.");
            }

            messageEl.textContent = tSafe(successKey, successFallback);
            console.log("[REDIRECT]", redirectTarget);

            window.location.replace(redirectTarget);
            setTimeout(function () {
              if (window.location.href !== redirectTarget) {
                window.location.href = redirectTarget;
              }
            }, 120);
          } catch (error) {
            console.error("[LOGIN] unexpected error", error);
            messageEl.textContent = error && error.message ? error.message : "Login gagal.";
            messageEl.classList.add("error");
            setFormLoadingState(form, false);
          }
        }

        // Re-apply saat bahasa diganti
        document.querySelectorAll(".lang-btn").forEach(function (btn) {
          btn.addEventListener("click", function (event) {
            var lang = btn.getAttribute("data-lang");
            event.preventDefault();

            if (typeof window.setLanguage === "function") {
              window.setLanguage(lang);
            } else if (typeof setLanguage === "function") {
              setLanguage(lang);
            }

            setTimeout(function () {
              applyLoginLanguage(lang);
            }, 30);
          });
        });

        // 4. Tab switching
        var tabBtns = document.querySelectorAll(".login-tab-btn");
        var panels  = document.querySelectorAll(".login-panel");

        tabBtns.forEach(function (btn) {
          btn.addEventListener("click", function () {
            var target = btn.dataset.tab;
            tabBtns.forEach(function (b) {
              b.classList.toggle("active", b.dataset.tab === target);
              b.setAttribute("aria-selected", b.dataset.tab === target ? "true" : "false");
            });
            panels.forEach(function (p) {
              p.classList.toggle("active", p.id === "panel-" + target);
            });
            ["loginMessageLMS","loginMessageStaff"].forEach(function (id) {
              var el = document.getElementById(id);
              if (el) { el.textContent = ""; el.classList.remove("error"); }
            });
          });
        });

        // 5. LMS login
        document.getElementById("loginFormLMS").addEventListener("submit", async function (e) {
          e.preventDefault();
          await handleLoginSubmit({
            form: document.getElementById("loginFormLMS"),
            emailInput: document.getElementById("lms-email"),
            passwordInput: document.getElementById("lms-password"),
            messageEl: document.getElementById("loginMessageLMS"),
            allowedRoles: ["student","admin","trainer"],
            successKey: "lmsLoginSuccessRedirect",
            successFallback: "Login berhasil. Mengarahkan dashboard..."
          });
        });

        // 6. Marketer portal login
        document.getElementById("loginFormStaff").addEventListener("submit", async function (e) {
          e.preventDefault();
          await handleLoginSubmit({
            form: document.getElementById("loginFormStaff"),
            emailInput: document.getElementById("staff-email"),
            passwordInput: document.getElementById("staff-password"),
            messageEl: document.getElementById("loginMessageStaff"),
            allowedRoles: ["marketer","staff"],
            successKey: "staffLoginSuccessRedirect",
            successFallback: "Login berhasil. Mengarahkan ke portal..."
          });
        });

        // 7. Redirect jika sudah login
        waitForAuthModule(8000)
          .then(function (auth) {
            return auth.redirectIfLoggedIn();
          })
          .catch(function () {
            // Keep the login form usable even if auth bootstrap is delayed.
          });

      });
    </script>
  </body>
</html>
