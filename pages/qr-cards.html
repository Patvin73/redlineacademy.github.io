<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>QR Access Cards — Redline Academy Batch 1 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary-color: #d7001e;
  --primary-dark: #a50017;
  --primary-light: #fff0f2;
}

body {
  font-family: 'Arial', sans-serif;
  background: #f0f2f5;
  padding: 24px;
}

.page-header {
  text-align: center;
  margin-bottom: 24px;
  padding: 16px;
  background: #fff;
  border-radius: 12px;
  border: 1px solid #e4e7ec;
}

.page-header h1 {
  font-size: 18px;
  font-weight: 800;
  color: #101828;
}

.page-header p {
  font-size: 13px;
  color: #667085;
  margin-top: 4px;
}

.btn-print {
  margin-top: 12px;
  padding: 9px 22px;
  background: var(--primary-color);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
.btn-print:hover { background: var(--primary-dark); }

/* GRID */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}

/* CARD */
.card {
  background: #fff;
  border: 1.5px solid #e4e7ec;
  border-radius: 12px;
  padding: 14px 12px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,.07);
}

.card-top {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding-bottom: 8px;
  border-bottom: 1px solid #f0f2f5;
}

.card-logo {
  width: 82px;
  height: auto;
  display: block;
}

.card-brand {
  font-size: 9px;
  font-weight: 700;
  color: var(--primary-color);
  line-height: 1.2;
}

.card-no {
  position: absolute;
  right: 0;
  font-size: 9px;
  color: #98a2b3;
  font-weight: 700;
}

.qr-box {
  width: 110px;
  height: 110px;
  padding: 4px;
  background: #fff;
  border: 1px solid #e4e7ec;
  border-radius: 6px;
}

.qr-box canvas,
.qr-box img {
  width: 100% !important;
  height: 100% !important;
}

.card-name {
  font-size: 11px;
  font-weight: 800;
  color: #101828;
  text-align: center;
  line-height: 1.3;
}

.card-pos {
  font-size: 9px;
  color: #667085;
  text-align: center;
  line-height: 1.4;
}

.card-id {
  font-family: monospace;
  font-size: 8.5px;
  color: var(--primary-color);
  background: var(--primary-light);
  padding: 3px 7px;
  border-radius: 4px;
  border: 1px solid rgba(215, 0, 30, 0.18);
  letter-spacing: 0.3px;
  text-align: center;
}

.card-hint {
  font-size: 8px;
  color: #98a2b3;
  text-align: center;
}

/* PRINT */
@media print {
  body { background: #fff; padding: 8px; }
  .page-header { display: none; }
  .cards-grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .card {
    border: 1pt solid #ccc;
    break-inside: avoid;
    page-break-inside: avoid;
    box-shadow: none;
  }
}
</style>
</head>
<body>

<div class="page-header">
  <h1>🎓 QR Access Cards — Redline Academy</h1>
  <p>Pelatihan Penguji Kompetensi SDM Aparatur Bidang Pariwisata · Batch 1 · 2026 · Malang</p>
  <button class="btn-print" onclick="window.print()">🖨️ Print Kartu Akses</button>
</div>

<div class="cards-grid" id="cardsGrid"></div>

<script>

  { no:1,  id:"RA-MLG-B1-2026-X7K9M2QP", name:"Suwanto",                    pos:"Widyaiswara Ahli Madya" },

  { no:3,  id:"RA-MLG-B1-2026-Q2W7L9XF", name:"Herman Peudada",             pos:"Widyaiswara Ahli Pertama" },

  { no:7,  id:"RA-MLG-B1-2026-R3X6Q1ZM", name:"Putra Anindita",             pos:"Adyatama Kepariwisataan Ahli Muda" },

const grid = document.getElementById('cardsGrid');

PARTICIPANTS.forEach(p => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-top">
      <img class="card-logo" src="../assets/images/redlinelogo.png" alt="Redline Academy Logo" loading="lazy" decoding="async">
      <div class="card-no">#${String(p.no).padStart(2,'0')}</div>
    </div>
    <div class="qr-box" id="qr-${p.no}"></div>
    <div class="card-name">${p.name}</div>
    <div class="card-pos">${p.pos}</div>
    <div class="card-id">${p.id}</div>
    <div class="card-hint">📱 Scan untuk masuk ke portal</div>
  `;
  grid.appendChild(card);

  // Generate QR — isi hanya Candidate ID agar scanner langsung mengenali
  new QRCode(document.getElementById(`qr-${p.no}`), {
    text: p.id,
    width: 102,
    height: 102,
    colorDark: '#101828',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
});
</script>
</body>
</html>
