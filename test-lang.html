<!doctype html>
<html lang="id">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JBME1NN8CD"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-JBME1NN8CD');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Language Switcher</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="canonical" href="https://redlineacademy.com.au/test-lang.html" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Halaman utilitas internal Redline Academy." />
</head>
  <body>
    <header>
      <div class="container">
        <div class="header-content">
          <div class="logo">
            <img
              src="assets/images/redlinelogo.png"
              alt="Redline Academy Logo"
            / loading="lazy" decoding="async" width="1043" height="624">
          </div>

          <nav>
            <a href="./" data-i18n="home">Beranda</a>
            <a href="pages/about.html" data-i18n="about">Tentang Kami</a>

            <div
              class="language-switcher"
              role="navigation"
              aria-label="Language selector"
            >
              <button
                class="lang-btn"
                data-lang="id"
                aria-label="Bahasa Indonesia"
              >
                <img
                  src="assets/images/flags/id.png"
                  alt="Bendera Indonesia"
                  class="flag"
                  aria-hidden="true"
                / loading="lazy" decoding="async" width="512" height="512">
                <span class="sr-only">Bahasa Indonesia</span>
              </button>
              <button class="lang-btn" data-lang="en" aria-label="English">
                <img
                  src="assets/images/flags/en.png"
                  alt="Bendera Inggris"
                  class="flag"
                  aria-hidden="true"
                / loading="lazy" decoding="async" width="512" height="512">
                <span class="sr-only">English</span>
              </button>
            </div>
          </nav>
        </div>
      </div>
    </header>

    <main>
      <section class="section-padding">
        <div class="container">
          <h1 data-i18n="heroTitle">Redline bukan sekadar akademi</h1>
          <p data-i18n="heroSubtitle">
            — ini adalah tempat untuk membuka potensi, menembus batas, dan
            mengambil kendali atas masa depanmu. Berani mengubah masa depanmu?
          </p>
        </div>
      </section>
    </main>

    <script>
      console.log("Test page loaded");
      console.log("Window object exists:", typeof window);
    </script>
    <script src="js/script.js" defer></script>
    <script>
      console.log("Script.js loaded");
      console.log("Translations available:", typeof translations);
      console.log("currentLanguage:", currentLanguage);
      console.log(
        "Lang buttons found:",
        document.querySelectorAll(".lang-btn").length,
      );
      console.log("setLanguage function:", typeof setLanguage);

      // Test manual language switch
      console.log("Testing manual language switch...");
      setTimeout(() => {
        console.log("Before switch - Language:", currentLanguage);
        setLanguage("en");
        console.log("After switch - Language:", currentLanguage);
      }, 1000);
    </script>
  </body>
</html>
